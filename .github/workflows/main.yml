name: Gartic (Camoufox, headless, Linux experiment)
on:
  schedule:
    - cron: '* * * * *'  # جهاز جديد كل دقيقة
  workflow_dispatch:

jobs:
  gartic-bot:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: 1. Aggressive system tuning (services, CPU, network, FS)
        run: |
          set +e
          echo "=== Linux system tuning for Camoufox throughput ==="

          for svc in snapd snapd.socket unattended-upgrades udisks2 \
                     packagekit ModemManager rsyslog avahi-daemon \
                     cron multipathd; do
              sudo systemctl stop    "$svc" 2>/dev/null
              sudo systemctl disable "$svc" 2>/dev/null
          done

          for tmr in apt-daily.timer apt-daily-upgrade.timer \
                     logrotate.timer fstrim.timer fwupd-refresh.timer \
                     man-db.timer motd-news.timer ua-timer.timer \
                     update-notifier-download.timer update-notifier-motd.timer \
                     dpkg-db-backup.timer e2scrub_all.timer; do
              sudo systemctl stop    "$tmr" 2>/dev/null
              sudo systemctl disable "$tmr" 2>/dev/null
          done

          for f in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
              [ -w "$f" ] && echo performance | sudo tee "$f" >/dev/null
          done

          for d in /sys/devices/system/cpu/cpu*/cpuidle/state*/disable; do
              [ -w "$d" ] && echo 1 | sudo tee "$d" >/dev/null
          done

          sudo modprobe tcp_bbr 2>/dev/null
          sudo sysctl -w net.core.default_qdisc=fq                2>/dev/null
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr      2>/dev/null
          sudo sysctl -w net.core.rmem_max=67108864               2>/dev/null
          sudo sysctl -w net.core.wmem_max=67108864               2>/dev/null
          sudo sysctl -w net.ipv4.tcp_rmem='4096 87380 67108864'  2>/dev/null
          sudo sysctl -w net.ipv4.tcp_wmem='4096 65536 67108864'  2>/dev/null
          sudo sysctl -w net.ipv4.tcp_fastopen=3                  2>/dev/null

          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1     2>/dev/null
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1 2>/dev/null

          sudo mount -o remount,noatime / 2>/dev/null
          [ -w /sys/kernel/mm/transparent_hugepage/enabled ] && \
              echo always | sudo tee /sys/kernel/mm/transparent_hugepage/enabled >/dev/null

          sudo sysctl -w kernel.watchdog=0 2>/dev/null

          pgrep -f 'Runner\.Listener|Runner\.Worker' \
              | xargs -r -I{} sudo renice -n 19 -p {} 2>/dev/null

          echo "=== System tuning complete ==="

      - name: 2. Create Camoufox directory and download generator script
        run: |
          sudo mkdir -p /opt/camoufox
          sudo chown "$USER":"$USER" /opt/camoufox
          
          # Download the Python script from this repo or create it inline
          cat > /opt/camoufox/generator.py << 'EOF'
import asyncio
import time
import aiohttp
from camoufox.async_api import AsyncCamoufox

MOONFI_URL = "https://lm9wd.alwaysdata.net/add"
TARGET_URL = "https://gartic.io"
SITEKEY = "0x4AAAAAAAABBPK aIbNwnPEfSo"
NUM_BROWSERS = 1
NUM_TABS = 6
NUM_LANES = 5
LANE_STAGGER_MS = 500
RELOAD_INTERVAL_MS = 60 * 1_000
BROWSER_LIFETIME_MS = 50 * 60_000

_level_counts = {"0": 0, "1": 0, "other": 0}

RENDERER_JS = """
(function () {
  document.body.innerHTML = '';
  for (var i = 0; i < __NUM_LANES__; i++) {
    var div = document.createElement('div');
    div.id = 'kutu_' + i;
    document.body.appendChild(div);
  }
  var script = document.createElement('script');
  script.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
  script.onload = function () {
    for (var i = 0; i < __NUM_LANES__; i++) {
      (function (idx) {
        setTimeout(function () {
          var widgetId = window.turnstile.render('#kutu_' + idx, {
            sitekey: '__SITEKEY__',
            callback: function (token) {
              console.log('T:' + token);
              window.turnstile.reset(widgetId);
            },
            'error-callback': function () { window.turnstile.reset(widgetId); }
          });
        }, idx * __LANE_STAGGER_MS__);
      })(i);
    }
  };
  document.head.appendChild(script);
})();
"""

def _fill(js):
    return (
        js.replace("__NUM_LANES__", str(NUM_LANES))
          .replace("__LANE_STAGGER_MS__", str(LANE_STAGGER_MS))
          .replace("__SITEKEY__", SITEKEY)
    )

async def inject_renderer(page):
    await page.add_script_tag(content=_fill(RENDERER_JS))

async def _post_token(session, token):
    try:
        async with session.post(MOONFI_URL, json={"token": token}) as resp:
            await resp.read()
    except Exception:
        pass

async def _route_handler(route):
    request = route.request
    if request.resource_type == "document":
        await route.continue_()
        return
    if "challenges.cloudflare.com" in request.url:
        await route.continue_()
        return
    await route.abort()

async def setup_tab(page, tab_id, session):
    last_time = [time.monotonic()]

    def on_console(msg):
        text = msg.text
        if text.startswith("T:"):
            now = time.monotonic()
            elapsed = now - last_time[0]
            last_time[0] = now
            token = text[2:]
            level = token[0] if token and token[1:2] == "." else "other"
            if level in _level_counts:
                _level_counts[level] += 1
            else:
                _level_counts["other"] += 1
            marker = "\x1b[32mL1✓\x1b[0m" if level == "1" else "\x1b[33mL0\x1b[0m"
            short = token[:24] + "..." + token[-12:]
            totals = f"L1:{_level_counts['1']} L0:{_level_counts['0']}"
            print(f"[tab{tab_id} {marker}] {short} | \x1b[31m{elapsed:.1f}s\x1b[0m | {totals}")
            asyncio.create_task(_post_token(session, token))

    page.on("console", on_console)
    await page.route("**/*", _route_handler)

    try:
        await page.goto(TARGET_URL, wait_until="domcontentloaded", timeout=60000)
    except Exception:
        pass
    await asyncio.sleep(0.5)
    try:
        await inject_renderer(page)
    except Exception:
        pass

    async def auto_clicker():
        while not page.is_closed():
            try:
                for frame in page.frames:
                    if "turnstile" in frame.url:
                        try:
                            await frame.click("#challenge-stage")
                        except Exception:
                            pass
                        try:
                            await frame.click('input[type="checkbox"]')
                        except Exception:
                            pass
            except Exception:
                pass
            await asyncio.sleep(3.0)

    async def reload_loop():
        while not page.is_closed():
            await asyncio.sleep(RELOAD_INTERVAL_MS / 1000)
            if page.is_closed():
                return
            try:
                await page.reload(wait_until="domcontentloaded", timeout=60000)
            except Exception:
                pass
            if page.is_closed():
                return
            try:
                await inject_renderer(page)
            except Exception:
                pass

    asyncio.create_task(auto_clicker())
    asyncio.create_task(reload_loop())

async def run_browser(browser_num, session):
    while True:
        try:
            print(f"[browser {browser_num}] launching fresh Camoufox...")
            async with AsyncCamoufox(
                headless=True,
                disable_coop=True,
                humanize=False,
                os=("windows", "macos", "linux"),
                firefox_user_prefs={
                    "fission.autostart": False,
                    "dom.ipc.processCount": 4,
                    "dom.ipc.processCount.webIsolate": 4,
                },
            ) as browser:
                for i in range(NUM_TABS):
                    tab_id = f"{browser_num}.{i + 1}"
                    context = await browser.new_context()
                    page = await context.new_page()
                    asyncio.create_task(setup_tab(page, tab_id, session))
                    if i < NUM_TABS - 1:
                        await asyncio.sleep(3)
                await asyncio.sleep(BROWSER_LIFETIME_MS / 1000)
                print(f"[browser {browser_num}] lifetime reached, recycling...")
        except Exception as e:
            print(f"[browser {browser_num}] error: {e}")

async def main():
    async with aiohttp.ClientSession() as session:
        tasks = []
        for b in range(NUM_BROWSERS):
            tasks.append(asyncio.create_task(run_browser(b + 1, session)))
            if b < NUM_BROWSERS - 1:
                await asyncio.sleep((BROWSER_LIFETIME_MS / NUM_BROWSERS) / 1000)
        await asyncio.gather(*tasks, return_exceptions=True)

if __name__ == "__main__":
    asyncio.run(main())
EOF

      - name: 3. Install Python deps + fetch Camoufox Firefox
        working-directory: /opt/camoufox
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              libgtk-3-0 libxt6 libdbus-glib-1-2 libpci3 \
              libxss1 libnss3 libasound2t64 \
              fonts-liberation

          python3 -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/python -m pip install camoufox aiohttp
          ./venv/bin/python -m camoufox fetch

      - name: 4. Run generator
        working-directory: /opt/camoufox
        run: |
          sudo renice -n -20 -p $$ >/dev/null
          sudo ionice -c 1 -n 0 -p $$ >/dev/null 2>&1 || true
          ./venv/bin/python generator.py
